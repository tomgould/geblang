# Release config for the Geblang language toolchain (the geblang CLI).
# The gebweb CLI is released separately from github.com/dwgebler/gebweb (its own
# repo + Go module); it is useless without the gebweb framework sources a project
# installs via `geblang install`, so it does not belong in the geblang release.
# The VS Code extension ships as a release asset too: run `make vscode-build`
# first (it produces build/vscode/vsix/geblang.vsix), then release. Users can
# then install it with `code --install-extension geblang-vscode-<version>.vsix`.
# The Claude Code skill (.claude/skills/geblang/) is zipped by the before-hook below
# and shipped as geblang-claude-skill-<version>.zip (unzip into ~/.claude/skills).
# The release body is the version's section from docs/user/18-release-notes.md
# (not the commit log): pass it with --release-notes.
# Validate locally:  make vscode-build && goreleaser release --snapshot --clean --skip=publish
# Publish a release:
#   make vscode-build
#   scripts/release-notes.sh 1.29.2 > /tmp/notes.md
#   git tag 1.29.2 && GITHUB_TOKEN=... goreleaser release --clean --release-notes /tmp/notes.md
# Published to github.com/dwgebler/geblang regardless of the local git remote.
version: 2

changelog:
  disable: true

project_name: geblang

# Zip the Claude Code skill (.claude/skills/geblang/) into build/ so it can ship as a release asset.
before:
  hooks:
    - "sh -c 'mkdir -p build && cd .claude/skills && rm -f ../../build/geblang-claude-skill.zip && zip -qr ../../build/geblang-claude-skill.zip geblang'"

builds:
  - id: geblang
    main: ./cmd/geblang
    binary: geblang
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: toolchain
    ids: [geblang]
    name_template: "geblang_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*
      - NOTICES.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  github:
    owner: dwgebler
    name: geblang
  draft: true
  name_template: "Geblang {{ .Version }}"
  extra_files:
    - glob: ./build/vscode/vsix/geblang.vsix
      name_template: "geblang-vscode-{{ .Version }}.vsix"
    - glob: ./build/geblang-claude-skill.zip
      name_template: "geblang-claude-skill-{{ .Version }}.zip"
